<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Artist Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Artist & Visual Creator</p>
    </header>

    <nav>
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <main>
        <section id="work" class="gallery">
            <h2>Featured Work</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="art1.jpg" alt="Artwork 1">
                    <p>Project Title</p>
                </div>
                <div class="gallery-item">
                    <img src="art2.jpg" alt="Artwork 2">
                    <p>Project Title</p>
                </div>
                <div class="gallery-item">
                    <img src="art3.jpg" alt="Artwork 3">
                    <p>Project Title</p>
                </div>
            </div>
        </section>

        <section id="about" class="about">
            <h2>About Me</h2>
            <p>Write a brief bio about yourself and your artistic practice here.</p>
        </section>

        <section id="contact" class="contact">
            <h2>Get In Touch</h2>
            <p>Email: your.email@example.com</p>
            <p><a href="https://instagram.com/yourhandle">Instagram</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
